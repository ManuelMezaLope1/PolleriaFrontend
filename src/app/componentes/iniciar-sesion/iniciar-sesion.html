<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon">🍗</div>
      <h2>Bienvenido de vuelta</h2>
      <p>Inicia sesión para disfrutar de nuestras promociones</p>
    </div>

    <form (ngSubmit)="iniciarSesion()" class="auth-form">
      <div class="form-group">
        <label for="email">
          <i>📧</i> Correo Electrónico
        </label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder=""
          required
          class="form-control"
        >
      </div>

      <div class="form-group">
        <label for="password">
          <i>🔒</i> Contraseña
        </label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"

          required
          class="form-control"
        >
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-auth">Iniciar Sesión</button>

      <div class="auth-footer">
        <p>¿No tienes una cuenta?
          <a routerLink="/registrarse">Regístrate aquí</a>
        </p>
      </div>
    </form>

    </div>
</div>
