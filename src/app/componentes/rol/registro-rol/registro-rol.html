<div class="col-md-6 offset-md-3">
    <h3 class="text-center">Registro de Roles</h3>
    <form (ngSubmit)="onSubmit()" #rolForm="ngForm">
        <div class="form-group">
            <label>Nombre : </label>
            <input type="text" class="form-control" id="nombre" [(ngModel)]="rol.nombre" name="nombre" required
                minlength="4" maxlength="20" placeholder="Digite su nombre " #nombre="ngModel" />
            <div class="alert alert-danger" *ngIf="nombre.invalid && (nombre.dirty || nombre.touched)">
                <div *ngIf="nombre.errors?.['required']">
                    Digite su nombre por favor
                </div>
                <div *ngIf="nombre.errors?.['minlength']">
                    El nombre tiene que contener como mínimo 4 caracteres
                </div>
                <div *ngIf="nombre.errors?.['maxlength']">
                    El nombre tiene que tener como máximo 20 caracteres
                </div>
            </div>
        </div>

        <button class="btn btn-success" [disabled]="!rolForm.form.valid">Guardar</button>
    </form>
</div>
